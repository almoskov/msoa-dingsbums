version: '3.8'

services:
  product-service:
    build:
      context: ./services/product-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
    volumes:
      - ./services/product-service:/app
      - /app/node_modules
    command: npm run dev

  inventory-service:
    build:
      context: ./services/inventory-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=development
    volumes:
      - ./services/inventory-service:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - product-service

  order-service:
    build:
      context: ./services/order-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - PRODUCT_SERVICE_URL=http://product-service:3001
      - INVENTORY_SERVICE_URL=http://inventory-service:3002
      - NODE_ENV=development
    volumes:
      - ./services/order-service:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - product-service
      - inventory-service
