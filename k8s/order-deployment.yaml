apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: garden
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ghcr.io/your-org/order-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: garden-config
                  key: ORDER_PORT
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: garden-config
                  key: PRODUCT_SERVICE_URL
            - name: INVENTORY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: garden-config
                  key: INVENTORY_SERVICE_URL
          envFrom:
            - secretRef:
                name: garden-secrets
          ports:
            - containerPort: 3003
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: order-db
              mountPath: /app/data
      volumes:
        - name: order-db
          persistentVolumeClaim:
            claimName: order-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: order-db-pvc
  namespace: garden
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: garden
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - name: http
      port: 3003
      targetPort: 3003
